# .github/workflows/deploy.yml
name: Deploy JAR

on:
  push:
    branches: [ feat/SCRUM-71 ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3

      # JDK 설정
      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create config files
        run: |
          # application.yml
          cat > src/main/resources/application.yml << 'EOF'
          ${{ secrets.APPLICATION_YML }}
      # vertex_ai_key.json 생성
      - name: create-json
        id: create-json
        uses: jsdaniell/create-json@1.1.2
        with:
          name: "vertex_ai_key.json"
          json: ${{ secrets.VERTEX_AI_KEY }}
          dir: 'src/main/resources'
      - name: Build JAR
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: Run JAR
        run: |
          # 기존 프로세스 종료
          pkill -f WellMeet-Recommendation-0.0.1-SNAPSHOT.jar || true
          
          # 새 JAR 실행
          setsid nohup java -jar build/libs/WellMeet-Recommendation-0.0.1-SNAPSHOT.jar > app.log 2>&1 < /dev/null &
          
          
          # 헬스체크 (최대 30초 대기)
          SUCCESS=false
          for i in {1..30}; do
          if curl -f http://localhost:8080/health; then
          echo "✅ Application is healthy"
          SUCCESS=true
          break  # exit 대신 break 사용
          fi
          echo "Waiting for application to start... ($i/30)"
          sleep 1
          done
          
          # 결과 확인
          if [ "$SUCCESS" = true ]; then
          echo "✅ Deployment successful"
          else
          echo "❌ Application failed to start"
          cat app.log
          exit 1
          fi
