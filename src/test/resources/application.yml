spring:
  profiles:
    active: test
---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/restaurant
    username: postgres
    password: "0000"
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  ai:
    openai:
      api-key: dummy-key
      # Chat 모델 설정
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
      
      # Embedding 모델 설정
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 768

cors:
  origin: http://localhost:5173

services:
  restaurant:
    url: http://host.docker.internal:8080
kakao:
  rest-api-key: test
