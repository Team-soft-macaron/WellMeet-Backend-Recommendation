spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant
    username: postgres
    password: "0000"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      # Chat 모델 설정
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3
      
      # Embedding 모델 설정
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 768
